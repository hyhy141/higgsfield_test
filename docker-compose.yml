# Boots the memory service + its Postgres/pgvector backing store with a single
# `docker compose up -d` — no .env required. Compose interpolates ${VAR:-default}
# from the shell and an optional project .env (auto-loaded), so a missing .env can
# never fail the boot. Data persists in the named volume `memory_pgdata`.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    volumes:
      - memory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  app:
    build: .
    # No mandatory `env_file`: all config comes from environment defaults below,
    # so the stack boots even with no .env present.
    environment:
      # Database (defaults to the bundled Postgres+pgvector service).
      DATABASE_URL: ${DATABASE_URL:-postgresql://memory:memory@db:5432/memory}
      # Optional LLM extraction (OpenAI or Anthropic). Empty -> rule-based engine.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EXTRACTION_PROVIDER: ${EXTRACTION_PROVIDER:-auto}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-}
      # Optional bearer auth. Empty -> auth disabled.
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      # Service.
      PORT: ${PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_TURN_BYTES: ${MAX_TURN_BYTES:-200000}
      # Recall tuning.
      RECALL_GATE_TURN_COSINE: ${RECALL_GATE_TURN_COSINE:-0.62}
      RECALL_GATE_MEMORY_COSINE: ${RECALL_GATE_MEMORY_COSINE:-0.66}
      RECALL_QUERY_DECOMPOSITION: ${RECALL_QUERY_DECOMPOSITION:-true}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  memory_pgdata:
