# Boots the memory service + its Postgres/pgvector backing store with a single
# `docker compose up`. Data persists in the named volume `memory_pgdata`, so
# `docker compose down && docker compose up` is invisible to clients.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    volumes:
      - memory_pgdata:/var/lib/postgresql/data
    # Uncomment to inspect the DB from the host (kept internal by default to
    # avoid clashing with any local Postgres on 5432).
    # ports:
    #   - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  app:
    build: .
    # Load optional secrets/overrides from .env if present (file is git-ignored).
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://memory:memory@db:5432/memory
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      EXTRACTION_PROVIDER: ${EXTRACTION_PROVIDER:-auto}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RECALL_RELEVANCE_THRESHOLD: ${RECALL_RELEVANCE_THRESHOLD:-0.04}
      RECALL_QUERY_DECOMPOSITION: ${RECALL_QUERY_DECOMPOSITION:-true}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  memory_pgdata:
